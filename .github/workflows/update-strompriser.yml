name: Update electricity spot prices

on:
  # Run on the 2nd of every month at 06:00 UTC (previous month is fully available)
  schedule:
    - cron: "0 6 * * *"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch spot prices
        run: node scripts/update-strompriser.mjs

      - name: Commit updated prices
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/strompriser.json
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "Update electricity spot prices $(date +'%Y-%m')" && git push
